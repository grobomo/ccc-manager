# Manager config for rone-teams-poller
# K8s pod monitoring + RONE bridge for SELF_REPAIR/REPLY tasks

name: rone-teams-poller
interval: 30000
healthPort: 8081

monitors:
  pod-health:
    type: process
    command: kubectl get pods -n hackathon-teams-poller --no-headers | grep -v Running
    interval: 30000

inputs:
  rone-bridge:
    type: bridge
    path: /data/rone-bridge/requests/pending
    completedDir: /data/rone-bridge/requests/completed

dispatcher:
  type: shtd

verifiers:
  tests:
    type: test-suite
    command: kubectl exec deploy/teams-poller -n hackathon-teams-poller -- node test/health.js

workers:
  default:
    type: k8s
    namespace: hackathon-teams-poller
    pod: teams-poller-0
    container: ccc-worker
