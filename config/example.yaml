# Example manager config — shows all supported fields.
# Copy and customize per project.

name: example
interval: 60000

# Monitors detect issues automatically
monitors:
  # Process monitor — run command, report if exit != 0
  # health:
  #   type: process
  #   command: kubectl get pods --no-headers | grep -v Running
  # Log monitor — tail file, match regex patterns
  # logs:
  #   type: log
  #   path: /var/log/app.log
  #   patterns:
  #     - ERROR
  #     - OOM
  # Cron monitor — run checks on independent schedule (cron expression)
  # scheduled-check:
  #   type: cron
  #   command: curl -f http://localhost:8080/healthz
  #   schedule: "*/5 * * * *"

# Inputs receive tasks from external sources
inputs:
  # bridge:
  #   type: bridge
  #   path: /data/bridge/tasks

# Dispatcher analyzes issues and distributes work
# type: shtd (structured fallback) or claude (AI-powered via claude -p)
dispatcher:
  type: shtd
  # Claude dispatcher options (when type: claude):
  # claudePath: claude
  # model: haiku
  # timeout: 60000
  # projectDir: /path/to/project
  # maxPromptLen: 4000

# Verifiers confirm fixes were applied correctly
verifiers:
  # tests:
  #   type: test-suite
  #   command: npm test

# Workers execute tasks
workers:
  # default:
  #   type: local
  #   timeout: 120000
  # k8s-worker:
  #   type: k8s
  #   namespace: my-namespace
  #   pod: worker-pod
  #   container: main

# Notifiers post results to external services
notifiers:
  # teams:
  #   type: webhook
  #   url: https://outlook.office.com/webhook/...
  #   format: teams
  # slack:
  #   type: webhook
  #   url: https://hooks.slack.com/services/...
  #   format: slack
  # File notifier — write results to disk for bridge consumption
  # results:
  #   type: file
  #   dir: /data/bridge/results
  #   prefix: result

# Retry failed tasks N times before marking as failed (default: 0)
# maxRetries: 2

# Health endpoint port (default: 8080)
# healthPort: 8080

# Queue drain timeout on shutdown in ms (default: 30000)
# drainTimeout: 30000

# Dedup window — ignore duplicate issue IDs within this period (default: 3600000 = 1hr)
# dedupWindow: 3600000

# Max history entries — prune oldest when exceeded (default: 1000)
# maxHistory: 1000

# Log format: text (default, human-readable) or json (structured, for production)
# Also configurable via CCC_LOG_FORMAT=json env var
# logFormat: text

# Hot-reload: interval, maxRetries, dedupWindow, maxHistory, drainTimeout
# are reloaded automatically when the config file changes on disk.
# Structural changes (monitors, inputs, workers) require restart.
