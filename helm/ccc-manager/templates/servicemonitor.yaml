{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ccc-manager.fullname" . }}
  labels:
    {{- include "ccc-manager.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "ccc-manager.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: health
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
